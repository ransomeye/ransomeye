# Included from /etc/nginx/conf.d/ (http context). Rate-limit zones must live here, not under server-only snippets.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

server {
    listen 443 ssl http2;
    server_name _;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_certificate     /opt/ransomeye/core/certs/server.crt;
    ssl_certificate_key /opt/ransomeye/core/certs/server.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss:; script-src 'self'; style-src 'self'; img-src 'self' data:;" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass http://127.0.0.1:8443;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}
