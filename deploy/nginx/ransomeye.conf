# RansomEye nginx reverse proxy — SOC Dashboard (PRD-17, PRD-12)
# TLS 1.3 termination for SOC UI on port 443.
# Backend: 127.0.0.1:8443 (Core SOC WebSocket/REST).
# Air-gapped: no external resources, strict CSP.

server {
    listen 443 ssl http2;
    server_name ransomeye.local;

    # TLS 1.3 only (PRD-14)
    ssl_protocols TLSv1.3;
    ssl_certificate     /etc/ransomeye/nginx/server.crt;
    ssl_certificate_key /etc/ransomeye/nginx/server.key;
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' wss://ransomeye.local; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # SOC Dashboard (static files)
    location / {
        root /opt/ransomeye/ui/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # SOC REST API and WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Deny all HTTP (force HTTPS)
server {
    listen 80;
    server_name ransomeye.local;
    return 301 https://$host$request_uri;
}
