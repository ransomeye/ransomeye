data_directory = '/opt/ransomeye/core/postgres/data'
hba_file = '/opt/ransomeye/core/postgres/pg_hba.conf'
ident_file = '/opt/ransomeye/core/postgres/pg_ident.conf'

listen_addresses = '127.0.0.1'
port = 5432
unix_socket_directories = '/opt/ransomeye/core/postgres'

# TLS 1.3 only (PRD-14). PostgreSQL MUST use the installer-provisioned leaf + CA under /opt/ransomeye/core/certs/ only.
ssl = on
ssl_cert_file = '/opt/ransomeye/core/certs/server.crt'
ssl_key_file = '/opt/ransomeye/core/certs/server.key'
ssl_ca_file = '/opt/ransomeye/core/certs/ca-chain.crt'
ssl_min_protocol_version = 'TLSv1.3'
ssl_max_protocol_version = 'TLSv1.3'

password_encryption = scram-sha-256
shared_preload_libraries = 'timescaledb'

shared_buffers = 256MB
wal_level = replica
synchronous_commit = on
fsync = on

cluster_name = 'ransomeye'
log_destination = 'stderr'
logging_collector = on
log_directory = '/opt/ransomeye/core/postgres/log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 0
